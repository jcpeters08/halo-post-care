<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' blob: data:; connect-src https://api.github.com; object-src 'none'; base-uri 'self'; form-action 'none'">
    <meta name="theme-color" content="#f7f4ef">
    <title>Halo Post-Care</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icons/app-icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icons/app-icon.svg">
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">Halo Post-Care</p>
          <h1 id="screen-title">Today</h1>
        </div>
        <a class="call-link" href="tel:9527673163">Call clinic</a>
      </header>
      <main id="app" class="app-main" tabindex="-1"></main>
      <p id="sync-status" class="sync-status" aria-live="polite">Ready</p>
      <p class="app-disclaimer">Clinic instructions and your provider override this app.</p>
      <nav class="tab-nav" aria-label="Primary">
        <button class="tab-button is-active" type="button" data-action="route" data-route="today">Today</button>
        <button class="tab-button" type="button" data-action="route" data-route="log">Log</button>
        <button class="tab-button" type="button" data-action="route" data-route="assessments">Assess</button>
        <button class="tab-button" type="button" data-action="route" data-route="guide">Guide</button>
        <button class="tab-button" type="button" data-action="route" data-route="settings">Settings</button>
      </nav>
    </div>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
